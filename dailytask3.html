<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>images in tables</h1>
    <hr>
    <p>what are your favorite pets?</p>
    <table border="1" cellspacing="0" width="400" hight="500">
        <thead>
            <tr>
                <th>pet image</th>
                <th>More fact about(as a link)</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><img src="horse.jpg" width="200" height="150"></td>
                <td><a href="https://en.wikipedia.org/wiki/Horse">horse</a></td>
            </tr>
            <tr>
                <td><img src="dogs.jpg" width="200" height="150"></td>
                <td><a href="https://en.wikipedia.org/wiki/Dog">Dogs</a></td>
            </tr>
            <tr>
                <td><img src="cat.jpg" width="200" height="150"></td>
                <td><a href="https://en.wikipedia.org/wiki/Cat">cat</a></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
