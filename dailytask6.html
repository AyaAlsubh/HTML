<!DOCTYPE html>
<html>
<head>
<style>

table{
border-spacing:20px;
}

td{
border:2px solid gray;
padding:10px 20px;
border-radius:10px;
box-shadow:3px 3px 5px gray;
font-size:20px;
}

</style>
</head>

<body>

<h1>Table Styling</h1>

<table>
<tr>
<td>Row 1, Col 1</td>
<td>Row 1, Col 2</td>
<td>Row 1, Col 3</td>
</tr>

<tr>
<td>Row 2, Col 1</td>
<td>Row 2, Col 2</td>
<td>Row 2, Col 3</td>
</tr>
</table>

</body>
</html>
